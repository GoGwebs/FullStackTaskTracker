<div class="d-flex justify-content-start mx-3">
    <a href="" class="btn btn-primary">Back</a>
</div>
<div class="d-flex bg-light justify-content-center m-3 align-items-center rounded">
    <div class="bg-secondary p-4 rounded" style="width: 600px;">

    @if (this.taskService.loading()) {
    <div class="d-flex justify-content-center my-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  }

    @if (taskService.error()) {
        <div class="alert alert-danger">
            Error loading task data: {{ taskService.error() }}
        </div>
    }
        

    @if (!taskService.loading()) {
        <app-task-form 
            submitLabel="Add New Task"
            (submitted)="onCreate($event)" 
            (cancel)="onCancel()"
        ></app-task-form>
      }

    </div>
</div>
