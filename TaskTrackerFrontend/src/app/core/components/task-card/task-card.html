<a class="" (click)="goToEdit()">
  <div class="card h-100 shadow-sm">
    <div class="card-body d-flex flex-column">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <h5 class="card-title mb-0">{{ task().title }}</h5>
        <span class="badge" [class]="priorityClass">{{ task().priority }}</span>
      </div>

      <p class="card-text text-muted flex-grow-1">{{ task().description }}</p>

      <div class="mb-2">
        <label class="form-label small text-muted mb-1">Status</label>
        <select
          class="form-select form-select-sm"
          [ngModel]="task().status"
          (ngModelChange)="onStatusChange($event)"
        >
          @for (s of statuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>

      <div class="d-flex justify-content-between small text-muted mt-auto">
        <span>Due: {{ task().dueDate | date: 'mediumDate' }}</span>
        <span>Created: {{ task().createdAt | date: 'mediumDate' }}</span>
      </div>
    </div>
  </div>
</a>
